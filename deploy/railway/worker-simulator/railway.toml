# Railway service: worker-simulator (Worker — produção acadêmica)
# Config file path: deploy/railway/worker-simulator/railway.toml

[build]
builder = "DOCKERFILE"
dockerfilePath = "deploy/railway/worker-simulator/Dockerfile"
watchPatterns = ["worker/**", "deploy/railway/worker-simulator/**"]

[build.args]
WORKER_DEPS = "simulator"
WORKER_ROLE = "simulator"

[deploy]
healthcheckPath = ""
restartPolicyType = "ALWAYS"
