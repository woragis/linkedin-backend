# Railway service: worker-graph (Worker)
# Config file path: deploy/railway/worker-graph/railway.toml

[build]
builder = "DOCKERFILE"
dockerfilePath = "deploy/railway/worker-graph/Dockerfile"
watchPatterns = ["worker/**", "deploy/railway/worker-graph/**"]

[build.args]
WORKER_DEPS = "base"
WORKER_ROLE = "graph"

[deploy]
healthcheckPath = ""
restartPolicyType = "ALWAYS"
