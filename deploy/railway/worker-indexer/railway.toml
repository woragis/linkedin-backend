# Railway service: worker-indexer (Worker)
# Config file path: deploy/railway/worker-indexer/railway.toml

[build]
builder = "DOCKERFILE"
dockerfilePath = "deploy/railway/worker-indexer/Dockerfile"
watchPatterns = ["worker/**", "deploy/railway/worker-indexer/**"]

[build.args]
WORKER_DEPS = "base"
WORKER_ROLE = "indexer"

[deploy]
healthcheckPath = ""
restartPolicyType = "ALWAYS"
