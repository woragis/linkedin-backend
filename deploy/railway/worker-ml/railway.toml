# Railway service: worker-ml (Worker)
# Config file path: deploy/railway/worker-ml/railway.toml

[build]
builder = "DOCKERFILE"
dockerfilePath = "deploy/railway/worker-ml/Dockerfile"
watchPatterns = ["worker/**", "deploy/railway/worker-ml/**"]

[deploy]
healthcheckPath = "/health"
restartPolicyType = "ALWAYS"
