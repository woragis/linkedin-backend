# Railway service: worker-realtime (Worker — not Web)
# Root Directory: (empty / repo root)
# Config file path: deploy/railway/worker-realtime/railway.toml

[build]
builder = "DOCKERFILE"
dockerfilePath = "deploy/railway/worker-realtime/Dockerfile"
watchPatterns = ["worker/**", "deploy/railway/worker-realtime/**"]

[build.args]
WORKER_DEPS = "base"
WORKER_ROLE = "realtime"

[deploy]
# Workers are not web services — HTTP healthcheck causes false deploy failures.
healthcheckPath = ""
restartPolicyType = "ALWAYS"
