# Import no Railway: arraste este arquivo para o canvas do projeto.
# Postgres e Redis: use plugins gerenciados do Railway (não estão neste compose).
#
# Depois do import:
# 1. Troque cada worker-* de Web Service → Worker (Settings)
# 2. Em cada serviço, defina Config file path (ver deploy/railway/*/railway.toml)
# 3. Ligue DATABASE_URL e REDIS_URL via reference variables

name: linkedin-railway

services:
  api:
    build:
      context: .
      dockerfile: server/Dockerfile
    environment:
      HTTP_ADDR: ":8080"
      WORKER_HEALTH_ENABLED: "0"
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      JWT_SECRET: ${JWT_SECRET}
      INTERNAL_JOB_TOKEN: ${INTERNAL_JOB_TOKEN}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS}
      ELASTICSEARCH_URL: ${ELASTICSEARCH_URL:-}

  worker-realtime:
    build:
      context: .
      dockerfile: deploy/railway/worker-realtime/Dockerfile
    environment:
      WORKER_ROLE: realtime
      WORKER_HEALTH_ENABLED: "1"
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      REDIS_QUEUE_REALTIME: ${REDIS_QUEUE_REALTIME:-linkedin:jobs:realtime}
      REDIS_QUEUE_INDEXER: ${REDIS_QUEUE_INDEXER:-linkedin:jobs:indexer}
      REDIS_QUEUE_GRAPH: ${REDIS_QUEUE_GRAPH:-linkedin:jobs:graph}
      OUTBOX_POLL_INTERVAL_SEC: ${OUTBOX_POLL_INTERVAL_SEC:-2}

  worker-indexer:
    build:
      context: .
      dockerfile: deploy/railway/worker-indexer/Dockerfile
    environment:
      WORKER_ROLE: indexer
      WORKER_HEALTH_ENABLED: "1"
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      REDIS_QUEUE_INDEXER: ${REDIS_QUEUE_INDEXER:-linkedin:jobs:indexer}
      ELASTICSEARCH_URL: ${ELASTICSEARCH_URL:-}

  worker-graph:
    build:
      context: .
      dockerfile: deploy/railway/worker-graph/Dockerfile
    environment:
      WORKER_ROLE: graph
      WORKER_HEALTH_ENABLED: "1"
      BATCH_ENABLED: "1"
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      REDIS_QUEUE_GRAPH: ${REDIS_QUEUE_GRAPH:-linkedin:jobs:graph}

  worker-ml:
    build:
      context: .
      dockerfile: deploy/railway/worker-ml/Dockerfile
    environment:
      WORKER_ROLE: ml
      WORKER_HEALTH_ENABLED: "1"
      BATCH_ENABLED: "1"
      DATABASE_URL: ${DATABASE_URL}

  worker-batch:
    build:
      context: .
      dockerfile: deploy/railway/worker-batch/Dockerfile
    environment:
      WORKER_ROLE: batch
      WORKER_HEALTH_ENABLED: "1"
      BATCH_ENABLED: "1"
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}

  worker-simulator:
    build:
      context: .
      dockerfile: deploy/railway/worker-simulator/Dockerfile
    environment:
      WORKER_ROLE: simulator
      WORKER_HEALTH_ENABLED: "1"
      SIMULATOR_ENABLED: "1"
      SIMULATOR_AGENT_COUNT: ${SIMULATOR_AGENT_COUNT:-2000}
      SIMULATOR_PHASE: ${SIMULATOR_PHASE:-auto}
      SIMULATOR_ENQUEUE_SEARCH: "0"
      SIMULATOR_METRICS_ENABLED: "1"
      DATABASE_URL: ${DATABASE_URL}
