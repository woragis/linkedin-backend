# Backend stack: Postgres + Redis + API + Workers
#
#   cp .env.example .env
#   docker compose up -d --build
#
# API: http://127.0.0.1:8080

name: linkedin-backend

networks:
  internal:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  es_data:

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    env_file: .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-linkedin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-linkedin}
      POSTGRES_DB: ${POSTGRES_DB:-linkedin}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    networks:
      - internal
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.15.0
    restart: unless-stopped
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
      ES_JAVA_OPTS: -Xms512m -Xmx512m
    volumes:
      - es_data:/usr/share/elasticsearch/data
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://127.0.0.1:9200/_cluster/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12

  api:
    build:
      context: .
      dockerfile: server/Dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      HTTP_ADDR: ${HTTP_ADDR:-:8080}
      DATABASE_URL: ${DATABASE_URL:-postgres://${POSTGRES_USER:-linkedin}:${POSTGRES_PASSWORD:-linkedin}@postgres:5432/${POSTGRES_DB:-linkedin}?sslmode=disable}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      REDIS_QUEUE_KEY: ${REDIS_QUEUE_KEY:-linkedin:jobs}
      INTERNAL_JOB_TOKEN: ${INTERNAL_JOB_TOKEN:-dev-internal-token}
      JWT_SECRET: ${JWT_SECRET:-dev-jwt-secret-change-in-production}
      MIGRATIONS_DIR: ${MIGRATIONS_DIR:-/migrations}
      SKIP_SQL_MIGRATIONS: ${SKIP_SQL_MIGRATIONS:-0}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:3000,http://127.0.0.1:3000}
      CORS_ALLOW_CREDENTIALS: ${CORS_ALLOW_CREDENTIALS:-1}
      ELASTICSEARCH_URL: ${ELASTICSEARCH_URL:-http://elasticsearch:9200}
    networks:
      - internal
    ports:
      - "127.0.0.1:8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8080/health"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 15s

  worker-realtime:
    build:
      context: ./worker
      dockerfile: Dockerfile
      args:
        WORKER_DEPS: base
    restart: unless-stopped
    env_file: .env
    environment:
      WORKER_ROLE: realtime
      WORKER_HEALTH_PORT: 8081
      DATABASE_URL: ${DATABASE_URL:-postgres://${POSTGRES_USER:-linkedin}:${POSTGRES_PASSWORD:-linkedin}@postgres:5432/${POSTGRES_DB:-linkedin}?sslmode=disable}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      REDIS_QUEUE_KEY: ${REDIS_QUEUE_KEY:-linkedin:jobs}
      REDIS_QUEUE_REALTIME: ${REDIS_QUEUE_REALTIME:-linkedin:jobs:realtime}
      REDIS_QUEUE_INDEXER: ${REDIS_QUEUE_INDEXER:-linkedin:jobs:indexer}
      REDIS_QUEUE_GRAPH: ${REDIS_QUEUE_GRAPH:-linkedin:jobs:graph}
      OUTBOX_POLL_INTERVAL_SEC: ${OUTBOX_POLL_INTERVAL_SEC:-2}
    networks:
      - internal
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      api:
        condition: service_healthy

  worker-indexer:
    build:
      context: ./worker
      dockerfile: Dockerfile
      args:
        WORKER_DEPS: base
    restart: unless-stopped
    env_file: .env
    environment:
      WORKER_ROLE: indexer
      WORKER_HEALTH_PORT: 8082
      DATABASE_URL: ${DATABASE_URL:-postgres://${POSTGRES_USER:-linkedin}:${POSTGRES_PASSWORD:-linkedin}@postgres:5432/${POSTGRES_DB:-linkedin}?sslmode=disable}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      REDIS_QUEUE_INDEXER: ${REDIS_QUEUE_INDEXER:-linkedin:jobs:indexer}
      ELASTICSEARCH_URL: ${ELASTICSEARCH_URL:-http://elasticsearch:9200}
    networks:
      - internal
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
      api:
        condition: service_healthy

  worker-graph:
    build:
      context: ./worker
      dockerfile: Dockerfile
      args:
        WORKER_DEPS: base
    restart: unless-stopped
    env_file: .env
    environment:
      WORKER_ROLE: graph
      WORKER_HEALTH_PORT: 8083
      BATCH_ENABLED: ${BATCH_ENABLED:-1}
      DATABASE_URL: ${DATABASE_URL:-postgres://${POSTGRES_USER:-linkedin}:${POSTGRES_PASSWORD:-linkedin}@postgres:5432/${POSTGRES_DB:-linkedin}?sslmode=disable}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      REDIS_QUEUE_GRAPH: ${REDIS_QUEUE_GRAPH:-linkedin:jobs:graph}
    networks:
      - internal
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      api:
        condition: service_healthy

  worker-ml:
    build:
      context: ./worker
      dockerfile: Dockerfile
      args:
        WORKER_DEPS: ml
    restart: unless-stopped
    env_file: .env
    environment:
      WORKER_ROLE: ml
      WORKER_HEALTH_PORT: 8084
      BATCH_ENABLED: ${BATCH_ENABLED:-1}
      DATABASE_URL: ${DATABASE_URL:-postgres://${POSTGRES_USER:-linkedin}:${POSTGRES_PASSWORD:-linkedin}@postgres:5432/${POSTGRES_DB:-linkedin}?sslmode=disable}
    networks:
      - internal
    depends_on:
      postgres:
        condition: service_healthy
      api:
        condition: service_healthy

  worker-batch:
    build:
      context: ./worker
      dockerfile: Dockerfile
      args:
        WORKER_DEPS: base
    restart: unless-stopped
    env_file: .env
    environment:
      WORKER_ROLE: batch
      WORKER_HEALTH_PORT: 8085
      BATCH_ENABLED: ${BATCH_ENABLED:-1}
      DATABASE_URL: ${DATABASE_URL:-postgres://${POSTGRES_USER:-linkedin}:${POSTGRES_PASSWORD:-linkedin}@postgres:5432/${POSTGRES_DB:-linkedin}?sslmode=disable}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
    networks:
      - internal
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      api:
        condition: service_healthy

  # Synthetic population — produção acadêmica (estudo de redes)
  worker-simulator:
    profiles: ["sim", "prod"]
    build:
      context: ./worker
      dockerfile: Dockerfile
      args:
        WORKER_DEPS: simulator
    restart: unless-stopped
    env_file: .env
    environment:
      WORKER_ROLE: simulator
      WORKER_HEALTH_PORT: 8086
      DATABASE_URL: ${DATABASE_URL:-postgres://${POSTGRES_USER:-linkedin}:${POSTGRES_PASSWORD:-linkedin}@postgres:5432/${POSTGRES_DB:-linkedin}?sslmode=disable}
      SIMULATOR_AGENT_COUNT: ${SIMULATOR_AGENT_COUNT:-2000}
      SIMULATOR_SEED: ${SIMULATOR_SEED:-42}
      SIMULATOR_TICK_SEC: ${SIMULATOR_TICK_SEC:-1}
      SIMULATOR_PHASE: ${SIMULATOR_PHASE:-auto}
      SIMULATOR_BATCH_SIZE: ${SIMULATOR_BATCH_SIZE:-50}
      SIMULATOR_ENABLED: ${SIMULATOR_ENABLED:-1}
      SIMULATOR_TIMEZONE: ${SIMULATOR_TIMEZONE:-America/Recife}
      SIMULATOR_BOOTSTRAP_COMMIT_EVERY: ${SIMULATOR_BOOTSTRAP_COMMIT_EVERY:-100}
      SIMULATOR_ENQUEUE_SEARCH: ${SIMULATOR_ENQUEUE_SEARCH:-0}
      SIMULATOR_METRICS_ENABLED: ${SIMULATOR_METRICS_ENABLED:-1}
      SIMULATOR_METRICS_PORT: ${SIMULATOR_METRICS_PORT:-9100}
      SIMULATOR_GLOBAL_POSTS_POOL: ${SIMULATOR_GLOBAL_POSTS_POOL:-200}
    ports:
      - "127.0.0.1:9100:9100"
    networks:
      - internal
    depends_on:
      postgres:
        condition: service_healthy
      api:
        condition: service_healthy

  # Legacy aliases (profiles) — prefer split workers above
  worker-simulator-small:
    profiles: ["sim-small"]
    build:
      context: ./worker
      dockerfile: Dockerfile
      args:
        WORKER_DEPS: simulator
    restart: unless-stopped
    env_file: .env
    environment:
      WORKER_ROLE: simulator
      DATABASE_URL: ${DATABASE_URL:-postgres://${POSTGRES_USER:-linkedin}:${POSTGRES_PASSWORD:-linkedin}@postgres:5432/${POSTGRES_DB:-linkedin}?sslmode=disable}
      SIMULATOR_AGENT_COUNT: "500"
      SIMULATOR_SEED: ${SIMULATOR_SEED:-42}
      SIMULATOR_PHASE: ${SIMULATOR_PHASE:-auto}
      SIMULATOR_BATCH_SIZE: "30"
      SIMULATOR_ENQUEUE_SEARCH: "1"
      SIMULATOR_METRICS_PORT: "9101"
    ports:
      - "127.0.0.1:9101:9101"
    networks:
      - internal
    depends_on:
      postgres:
        condition: service_healthy
      api:
        condition: service_healthy

  worker-simulator-large:
    profiles: ["sim-large"]
    build:
      context: ./worker
      dockerfile: Dockerfile
      args:
        WORKER_DEPS: simulator
    restart: unless-stopped
    env_file: .env
    environment:
      WORKER_ROLE: simulator
      DATABASE_URL: ${DATABASE_URL:-postgres://${POSTGRES_USER:-linkedin}:${POSTGRES_PASSWORD:-linkedin}@postgres:5432/${POSTGRES_DB:-linkedin}?sslmode=disable}
      SIMULATOR_AGENT_COUNT: "10000"
      SIMULATOR_SEED: ${SIMULATOR_SEED:-42}
      SIMULATOR_PHASE: ${SIMULATOR_PHASE:-auto}
      SIMULATOR_TICK_SEC: ${SIMULATOR_TICK_SEC:-1}
      SIMULATOR_BATCH_SIZE: "100"
      SIMULATOR_BOOTSTRAP_COMMIT_EVERY: "250"
      SIMULATOR_ENQUEUE_SEARCH: "0"
      SIMULATOR_GLOBAL_POSTS_POOL: "400"
      SIMULATOR_METRICS_PORT: "9102"
    ports:
      - "127.0.0.1:9102:9102"
    networks:
      - internal
    depends_on:
      postgres:
        condition: service_healthy
      api:
        condition: service_healthy

  # Dev only: single worker with WORKER_ROLE=all
  # docker compose --profile dev up worker-all
  worker-all:
    profiles: ["dev"]
    build:
      context: ./worker
      dockerfile: Dockerfile
      args:
        WORKER_DEPS: dev
    restart: unless-stopped
    env_file: .env
    environment:
      WORKER_ROLE: all
      DATABASE_URL: ${DATABASE_URL:-postgres://${POSTGRES_USER:-linkedin}:${POSTGRES_PASSWORD:-linkedin}@postgres:5432/${POSTGRES_DB:-linkedin}?sslmode=disable}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      REDIS_QUEUE_KEY: ${REDIS_QUEUE_KEY:-linkedin:jobs}
      BATCH_ENABLED: ${BATCH_ENABLED:-1}
      ELASTICSEARCH_URL: ${ELASTICSEARCH_URL:-http://elasticsearch:9200}
    networks:
      - internal
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      api:
        condition: service_healthy

  # Optional Kafka-compatible broker (phase 7)
  # docker compose --profile kafka up -d
  redpanda:
    profiles: ["kafka"]
    image: redpandadata/redpanda:v24.2.4
    restart: unless-stopped
    command:
      - redpanda
      - start
      - --overprovisioned
      - --smp=1
      - --memory=512M
      - --reserve-memory=0M
      - --node-id=0
      - --check=false
      - --kafka-addr=internal://0.0.0.0:9092
      - --advertise-kafka-addr=internal://redpanda:9092
    networks:
      - internal
    healthcheck:
      test: ["CMD", "rpk", "cluster", "health"]
      interval: 10s
      timeout: 5s
      retries: 12
